<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>শুভ জন্মদিন - TANU</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Hind+Siliguri:wght@400;700&display=swap');

        :root {
            --primary-color: #ff4757;
            --accent-color: #ffa502;
        }

        body {
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a1c4fd);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Hind Siliguri', sans-serif;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #main-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 35px;
            padding: 40px 20px;
            width: 85%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 10;
        }

        #title {
            color: #fff;
            font-size: 28px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            margin-bottom: 10px;
        }

        .badge {
            background: #fff;
            color: var(--primary-color);
            padding: 6px 18px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #photo-area {
            display: none;
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            border: 6px solid #fff;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255,255,255,0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        #photo-area img { width: 100%; height: 100%; object-fit: cover; }

        .action-btn {
            background: #fff;
            color: #ff4757;
            border: none;
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .footer-text {
            display: none;
            color: #fff;
            font-size: 18px;
            margin-top: 20px;
            animation: fadeIn 1.5s;
            line-height: 1.6;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.2);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .confetti {
            position: absolute;
            pointer-events: none;
            animation: fall 3s linear forwards;
            z-index: 5;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="main-card">
    <div class="badge">Happy Birthday! 🎂</div>
    <h1 id="title">প্রিয় TANU!</h1>
    
    <div id="photo-area">
        <img src="./1000426673.jpg" onerror="this.src='https://via.placeholder.com/200?text=Tanu'">
    </div>

    <div id="cta">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpwaHpxeHpxeHpxeHpxeHpxeHpxeHpxeHpxeHpxeHpxeHpxJmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/l41lM8A5pBAH7U5W0/giphy.gif" width="100" style="display:block; margin: 0 auto 20px; border-radius: 10px;">
        <button class="action-btn" onclick="initiate()">সারপ্রাইজটি খুলুন</button>
    </div>

    <!-- আপনার দেওয়া ক্যাপশনটি এখানে সেট করা হয়েছে -->
    <p id="final-msg" class="footer-text">
        "শুভ জন্মদিন <b>TANU</b>! 🌸 দিনটি দারুণভাবে উপভোগ করো। তোমার মতো একজনকে বন্ধু হিসেবে পাওয়া সত্যিই ভাগ্যের ব্যাপার। সবসময় এভাবে পাশে থেকো! 🤝🎂"
    </p>
</div>

<script>
    function initiate() {
        document.getElementById('cta').style.display = 'none';
        document.getElementById('photo-area').style.display = 'block';
        document.getElementById('final-msg').style.display = 'block';

        setInterval(spawnEmoji, 150);
        triggerVoice();
    }

    function triggerVoice() {
        const synth = window.speechSynthesis;
        // ভয়েস মেসেজেও আপনার ক্যাপশনটি দেওয়া হয়েছে
        const text = "শুভ জন্মদিন তনু। দিনটি দারুণভাবে উপভোগ করো। তোমার মতো একজনকে বন্ধু হিসেবে পাওয়া সত্যিই ভাগ্যের ব্যাপার। সবসময় এভাবে পাশে থেকো।";
        
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'bn-BD';
        utter.rate = 0.9;
        utter.pitch = 1.1;

        synth.cancel();
        synth.speak(utter);
    }

    function spawnEmoji() {
        const emojis = ["🎂", "🎈", "🌸", "✨", "🤝", "💖"];
        const div = document.createElement('div');
        div.classList.add('confetti');
        div.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        div.style.left = Math.random() * 100 + "vw";
        div.style.top = "-5vh";
        div.style.fontSize = Math.random() * 20 + 20 + "px";
        div.style.animationDuration = Math.random() * 2 + 3 + "s";
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 4000);
    }
</script>

</body>
</html>
